name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: |
        pytest --cov=agshield --cov-report=xml --cov-report=term
    
    - name: Run linter
      run: |
        ruff check src tests
    
    - name: Format check
      run: |
        black --check src tests
  
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build
      run: |
        pip install -e .
        bash build_scripts/build_linux.sh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agshield-linux
        path: dist/agshield
  
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Build
      run: |
        pip install -e .
        build_scripts\build_windows.bat
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agshield-windows
        path: dist/agshield.exe
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install bandit
      run: pip install bandit safety
    
    - name: Run bandit
      run: bandit -r src/ -f json -o bandit-report.json || true
      continue-on-error: true
    
    - name: Run safety
      run: safety check --json || true
      continue-on-error: true
    
    - name: Upload reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
